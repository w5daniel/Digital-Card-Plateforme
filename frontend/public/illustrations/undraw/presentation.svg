<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Board -->
  <rect x="45" y="25" width="120" height="90" rx="4" fill="white" stroke="#5EEAD4" stroke-width="2"/>
  <!-- Board top bar -->
  <rect x="45" y="25" width="120" height="12" rx="4" fill="#0D9488"/>
  <!-- Chart on board -->
  <rect x="60" y="50" width="14" height="50" rx="2" fill="#5EEAD4"/>
  <rect x="80" y="65" width="14" height="35" rx="2" fill="#14B8A6"/>
  <rect x="100" y="45" width="14" height="55" rx="2" fill="#0D9488"/>
  <rect x="120" y="55" width="14" height="45" rx="2" fill="#14B8A6"/>
  <rect x="140" y="40" width="14" height="60" rx="2" fill="#0F766E"/>
  <!-- Board stand -->
  <line x1="105" y1="115" x2="120" y2="155" stroke="#94A3B8" stroke-width="2"/>
  <line x1="105" y1="115" x2="90" y2="155" stroke="#94A3B8" stroke-width="2"/>
  <!-- Person -->
  <circle cx="30" cy="98" r="12" fill="#CCFBF1"/>
  <rect x="18" y="113" width="24" height="40" rx="5" fill="#14B8A6"/>
  <rect x="21" y="151" width="8" height="18" rx="3" fill="#0D9488"/>
  <rect x="33" y="151" width="8" height="18" rx="3" fill="#0D9488"/>
  <!-- Pointer arm -->
  <line x1="42" y1="120" x2="58" y2="70" stroke="#0D9488" stroke-width="3" stroke-linecap="round"/>
  <!-- Ground -->
  <ellipse cx="100" cy="172" rx="70" ry="5" fill="#F0FDFA"/>
</svg>
