<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Envelope body -->
  <rect x="35" y="75" width="130" height="85" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <!-- Envelope flap -->
  <path d="M35 83 L100 125 L165 83" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <path d="M35 75 L100 115 L165 75" fill="#60A5FA"/>
  <!-- Paper airplane -->
  <g transform="translate(115, 38) rotate(15)">
    <path d="M0 20 L50 0 L15 18 Z" fill="#3B82F6"/>
    <path d="M0 20 L50 0 L18 25 Z" fill="#60A5FA"/>
    <path d="M15 18 L50 0 L18 25 Z" fill="#DBEAFE"/>
  </g>
  <!-- Motion lines -->
  <line x1="90" y1="55" x2="75" y2="55" stroke="#60A5FA" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="95" y1="45" x2="82" y2="45" stroke="#60A5FA" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="88" y1="65" x2="78" y2="65" stroke="#60A5FA" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Envelope lines (letter peeking) -->
  <line x1="60" y1="105" x2="100" y2="105" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="60" y1="115" x2="90" y2="115" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="60" y1="125" x2="95" y2="125" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
</svg>
