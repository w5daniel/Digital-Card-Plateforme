<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Globe shadow -->
  <ellipse cx="100" cy="178" rx="50" ry="6" fill="#E2E8F0"/>
  <!-- Globe -->
  <circle cx="100" cy="100" r="65" fill="#7DD3FC"/>
  <!-- Globe continents (abstract shapes) -->
  <ellipse cx="85" cy="78" rx="22" ry="18" fill="#0EA5E9" opacity="0.6"/>
  <ellipse cx="118" cy="100" rx="20" ry="25" fill="#0EA5E9" opacity="0.6"/>
  <ellipse cx="80" cy="120" rx="15" ry="12" fill="#0EA5E9" opacity="0.5"/>
  <!-- Globe latitude lines -->
  <ellipse cx="100" cy="70" rx="55" ry="12" stroke="#38BDF8" stroke-width="1" fill="none" opacity="0.5"/>
  <ellipse cx="100" cy="100" rx="65" ry="14" stroke="#38BDF8" stroke-width="1" fill="none" opacity="0.5"/>
  <ellipse cx="100" cy="130" rx="55" ry="12" stroke="#38BDF8" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- Globe meridian -->
  <ellipse cx="100" cy="100" rx="14" ry="65" stroke="#38BDF8" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- Network connections -->
  <line x1="70" y1="65" x2="120" y2="80" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <line x1="120" y1="80" x2="130" y2="115" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <line x1="130" y1="115" x2="85" y2="130" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <line x1="85" y1="130" x2="70" y2="65" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <line x1="70" y1="65" x2="130" y2="115" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="120" y1="80" x2="85" y2="130" stroke="white" stroke-width="1" opacity="0.4"/>
  <!-- Network dots -->
  <circle cx="70" cy="65" r="5" fill="white"/>
  <circle cx="70" cy="65" r="3" fill="#0EA5E9"/>
  <circle cx="120" cy="80" r="5" fill="white"/>
  <circle cx="120" cy="80" r="3" fill="#0EA5E9"/>
  <circle cx="130" cy="115" r="5" fill="white"/>
  <circle cx="130" cy="115" r="3" fill="#0EA5E9"/>
  <circle cx="85" cy="130" r="5" fill="white"/>
  <circle cx="85" cy="130" r="3" fill="#0EA5E9"/>
  <!-- Orbiting dot -->
  <circle cx="160" cy="60" r="3" fill="#38BDF8"/>
  <path d="M155 62 C148 72 138 55 145 48" stroke="#38BDF8" stroke-width="1" fill="none" stroke-dasharray="3 2"/>
</svg>