<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Chart background -->
  <rect x="30" y="30" width="140" height="130" rx="8" fill="#F0FDF4"/>
  <!-- Grid lines -->
  <line x1="50" y1="60" x2="155" y2="60" stroke="#D1FAE5" stroke-width="1"/>
  <line x1="50" y1="85" x2="155" y2="85" stroke="#D1FAE5" stroke-width="1"/>
  <line x1="50" y1="110" x2="155" y2="110" stroke="#D1FAE5" stroke-width="1"/>
  <line x1="50" y1="135" x2="155" y2="135" stroke="#D1FAE5" stroke-width="1"/>
  <!-- Bar 1 -->
  <rect x="55" y="115" width="18" height="30" rx="3" fill="#6EE7B7"/>
  <!-- Bar 2 -->
  <rect x="80" y="95" width="18" height="50" rx="3" fill="#34D399"/>
  <!-- Bar 3 -->
  <rect x="105" y="75" width="18" height="70" rx="3" fill="#10B981"/>
  <!-- Bar 4 -->
  <rect x="130" y="55" width="18" height="90" rx="3" fill="#059669"/>
  <!-- Upward arrow -->
  <path d="M52 120 L90 100 L115 80 L145 50" stroke="#10B981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="145,42 152,54 138,54" fill="#10B981"/>
  <!-- Axis lines -->
  <line x1="50" y1="45" x2="50" y2="148" stroke="#6EE7B7" stroke-width="2" stroke-linecap="round"/>
  <line x1="48" y1="145" x2="158" y2="145" stroke="#6EE7B7" stroke-width="2" stroke-linecap="round"/>
  <!-- Ground -->
  <line x1="20" y1="175" x2="180" y2="175" stroke="#E2E8F0" stroke-width="2" stroke-linecap="round"/>
</svg>