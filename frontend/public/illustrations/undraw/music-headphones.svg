<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Sound waves background -->
  <path d="M30 100c0-38 31-70 70-70s70 32 70 70" stroke="#FBCFE8" stroke-width="2" fill="none"/>
  <path d="M42 100c0-32 26-58 58-58s58 26 58 58" stroke="#FCE7F3" stroke-width="1.5" fill="none"/>
  <!-- Headband -->
  <path d="M40 105c0-33 27-60 60-60s60 27 60 60" stroke="#EC4899" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Headband highlight -->
  <path d="M55 90c0-25 20-45 45-45s45 20 45 45" stroke="#F472B6" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Left ear cup -->
  <rect x="28" y="95" width="28" height="45" rx="10" fill="#EC4899"/>
  <rect x="32" y="100" width="20" height="35" rx="7" fill="#F472B6"/>
  <!-- Left ear pad -->
  <rect x="35" y="104" width="14" height="27" rx="5" fill="#FBCFE8"/>
  <!-- Right ear cup -->
  <rect x="144" y="95" width="28" height="45" rx="10" fill="#EC4899"/>
  <rect x="148" y="100" width="20" height="35" rx="7" fill="#F472B6"/>
  <!-- Right ear pad -->
  <rect x="151" y="104" width="14" height="27" rx="5" fill="#FBCFE8"/>
  <!-- Sound waves from left -->
  <path d="M20 110c-4 0-4 8 0 8" stroke="#F9A8D4" stroke-width="1.5" fill="none"/>
  <path d="M14 106c-6 0-6 16 0 16" stroke="#FBCFE8" stroke-width="1.5" fill="none"/>
  <!-- Sound waves from right -->
  <path d="M180 110c4 0 4 8 0 8" stroke="#F9A8D4" stroke-width="1.5" fill="none"/>
  <path d="M186 106c6 0 6 16 0 16" stroke="#FBCFE8" stroke-width="1.5" fill="none"/>
  <!-- Musical notes -->
  <text x="90" y="170" font-family="sans-serif" font-size="16" fill="#F472B6">♪</text>
  <text x="110" y="165" font-family="sans-serif" font-size="12" fill="#FBCFE8">♫</text>
</svg>
