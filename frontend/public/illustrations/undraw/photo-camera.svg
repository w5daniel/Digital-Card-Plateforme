<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Camera body -->
  <rect x="30" y="65" width="140" height="95" rx="12" fill="#1E293B"/>
  <!-- Top bump (flash housing) -->
  <rect x="70" y="50" width="60" height="20" rx="6" fill="#334155"/>
  <!-- Lens outer ring -->
  <circle cx="100" cy="115" r="36" fill="#475569"/>
  <circle cx="100" cy="115" r="32" fill="#6366F1"/>
  <!-- Lens inner rings -->
  <circle cx="100" cy="115" r="26" fill="#818CF8"/>
  <circle cx="100" cy="115" r="20" fill="#C4B5FD"/>
  <circle cx="100" cy="115" r="14" fill="#312E81"/>
  <!-- Lens reflection -->
  <circle cx="93" cy="108" r="5" fill="#A5B4FC" opacity="0.5"/>
  <circle cx="108" cy="120" r="3" fill="#A5B4FC" opacity="0.3"/>
  <!-- Flash -->
  <circle cx="148" cy="80" r="6" fill="#FDE68A"/>
  <circle cx="148" cy="80" r="3" fill="white"/>
  <!-- Viewfinder -->
  <rect x="85" y="56" width="18" height="8" rx="2" fill="#1E293B"/>
  <!-- Shutter button -->
  <circle cx="135" cy="55" r="8" fill="#94A3B8"/>
  <circle cx="135" cy="55" r="5" fill="#CBD5E1"/>
  <!-- Mode dial -->
  <rect x="50" y="56" width="14" height="8" rx="3" fill="#94A3B8"/>
  <!-- Bottom detail -->
  <rect x="42" y="148" width="30" height="4" rx="2" fill="#334155"/>
</svg>
