<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Shadow -->
  <ellipse cx="100" cy="175" rx="60" ry="6" fill="#EEF2FF" opacity="0.6"/>
  <!-- Open book - left page -->
  <path d="M100 55c-30-10-60-5-65 0v100c5-5 35-10 65 0z" fill="white" stroke="#CBD5E1" stroke-width="1.5"/>
  <!-- Open book - right page -->
  <path d="M100 55c30-10 60-5 65 0v100c-5-5-35-10-65 0z" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
  <!-- Book spine -->
  <line x1="100" y1="50" x2="100" y2="155" stroke="#94A3B8" stroke-width="2"/>
  <!-- Left page lines -->
  <line x1="50" y1="72" x2="90" y2="65" stroke="#E2E8F0" stroke-width="2" stroke-linecap="round"/>
  <line x1="48" y1="85" x2="90" y2="78" stroke="#E2E8F0" stroke-width="2" stroke-linecap="round"/>
  <line x1="46" y1="98" x2="90" y2="91" stroke="#E2E8F0" stroke-width="2" stroke-linecap="round"/>
  <line x1="45" y1="111" x2="88" y2="104" stroke="#E2E8F0" stroke-width="2" stroke-linecap="round"/>
  <line x1="44" y1="124" x2="86" y2="117" stroke="#E2E8F0" stroke-width="2" stroke-linecap="round"/>
  <!-- Right page lines -->
  <line x1="110" y1="65" x2="150" y2="72" stroke="#E2E8F0" stroke-width="2" stroke-linecap="round"/>
  <line x1="110" y1="78" x2="152" y2="85" stroke="#E2E8F0" stroke-width="2" stroke-linecap="round"/>
  <line x1="110" y1="91" x2="154" y2="98" stroke="#E2E8F0" stroke-width="2" stroke-linecap="round"/>
  <!-- Graduation cap -->
  <path d="M100 15L60 32l40 17 40-17z" fill="#1E293B"/>
  <path d="M100 32v18" stroke="#1E293B" stroke-width="2"/>
  <rect x="95" y="28" width="10" height="8" fill="#334155"/>
  <!-- Cap top -->
  <rect x="88" y="12" width="24" height="5" rx="1" fill="#334155"/>
  <!-- Tassel -->
  <path d="M135 32v20" stroke="#F59E0B" stroke-width="2"/>
  <circle cx="135" cy="52" r="3" fill="#F59E0B"/>
  <path d="M135 32l5 0" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
</svg>
