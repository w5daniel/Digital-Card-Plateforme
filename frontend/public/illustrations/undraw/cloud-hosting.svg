<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Main cloud -->
  <ellipse cx="100" cy="68" rx="50" ry="30" fill="#BAE6FD"/>
  <ellipse cx="72" cy="72" rx="30" ry="24" fill="#BAE6FD"/>
  <ellipse cx="128" cy="72" rx="30" ry="24" fill="#BAE6FD"/>
  <ellipse cx="100" cy="80" rx="55" ry="18" fill="#BAE6FD"/>
  <!-- Cloud highlight -->
  <ellipse cx="95" cy="60" rx="30" ry="16" fill="#E0F2FE"/>
  <!-- Connection lines going down -->
  <line x1="75" y1="95" x2="75" y2="145" stroke="#0EA5E9" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="100" y1="95" x2="100" y2="155" stroke="#0EA5E9" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="125" y1="95" x2="125" y2="145" stroke="#0EA5E9" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Connection nodes -->
  <circle cx="75" cy="145" r="5" fill="#0EA5E9"/>
  <circle cx="100" cy="155" r="5" fill="#0EA5E9"/>
  <circle cx="125" cy="145" r="5" fill="#0EA5E9"/>
  <!-- Horizontal connector -->
  <line x1="75" y1="145" x2="125" y2="145" stroke="#0EA5E9" stroke-width="1.5"/>
  <!-- Server/base bar -->
  <rect x="55" y="165" width="90" height="14" rx="4" fill="#0EA5E9"/>
  <circle cx="70" cy="172" r="2.5" fill="#E0F2FE"/>
  <circle cx="80" cy="172" r="2.5" fill="#E0F2FE"/>
  <circle cx="90" cy="172" r="2.5" fill="#E0F2FE"/>
  <rect x="110" y="170" width="25" height="4" rx="2" fill="#BAE6FD"/>
  <!-- Down connection to server -->
  <line x1="100" y1="155" x2="100" y2="165" stroke="#0EA5E9" stroke-width="2" stroke-linecap="round"/>
  <!-- Small data dots on lines -->
  <circle cx="75" cy="115" r="3" fill="#E0F2FE"/>
  <circle cx="100" cy="125" r="3" fill="#E0F2FE"/>
  <circle cx="125" cy="118" r="3" fill="#E0F2FE"/>
</svg>
