<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Calendar body -->
  <rect x="35" y="50" width="130" height="120" rx="10" fill="#F1F5F9" stroke="#1E293B" stroke-width="2"/>
  <!-- Calendar header -->
  <rect x="35" y="50" width="130" height="32" rx="10" fill="#EF4444"/>
  <rect x="35" y="72" width="130" height="10" fill="#EF4444"/>
  <!-- Binding rings -->
  <rect x="65" y="42" width="8" height="20" rx="4" fill="#1E293B"/>
  <rect x="127" y="42" width="8" height="20" rx="4" fill="#1E293B"/>
  <!-- Month text placeholder -->
  <rect x="70" y="58" width="60" height="6" rx="3" fill="white" opacity="0.8"/>
  <!-- Grid lines -->
  <line x1="54" y1="108" x2="146" y2="108" stroke="#CBD5E1" stroke-width="0.8"/>
  <line x1="54" y1="130" x2="146" y2="130" stroke="#CBD5E1" stroke-width="0.8"/>
  <line x1="54" y1="152" x2="146" y2="152" stroke="#CBD5E1" stroke-width="0.8"/>
  <!-- Day numbers row 1 -->
  <text x="58" y="102" font-size="9" fill="#1E293B" font-family="sans-serif">1</text>
  <text x="74" y="102" font-size="9" fill="#1E293B" font-family="sans-serif">2</text>
  <text x="90" y="102" font-size="9" fill="#1E293B" font-family="sans-serif">3</text>
  <text x="106" y="102" font-size="9" fill="#1E293B" font-family="sans-serif">4</text>
  <text x="122" y="102" font-size="9" fill="#1E293B" font-family="sans-serif">5</text>
  <text x="138" y="102" font-size="9" fill="#1E293B" font-family="sans-serif">6</text>
  <!-- Day numbers row 2 -->
  <text x="58" y="124" font-size="9" fill="#1E293B" font-family="sans-serif">7</text>
  <text x="74" y="124" font-size="9" fill="#1E293B" font-family="sans-serif">8</text>
  <text x="90" y="124" font-size="9" fill="#1E293B" font-family="sans-serif">9</text>
  <text x="103" y="124" font-size="9" fill="#1E293B" font-family="sans-serif">10</text>
  <text x="119" y="124" font-size="9" fill="#1E293B" font-family="sans-serif">11</text>
  <text x="135" y="124" font-size="9" fill="#1E293B" font-family="sans-serif">12</text>
  <!-- Highlighted date -->
  <circle cx="94" cy="121" r="9" fill="#FCA5A5"/>
  <text x="90" y="124" font-size="9" fill="#EF4444" font-family="sans-serif" font-weight="bold">9</text>
  <!-- Day numbers row 3 -->
  <text x="55" y="146" font-size="9" fill="#1E293B" font-family="sans-serif">13</text>
  <text x="71" y="146" font-size="9" fill="#1E293B" font-family="sans-serif">14</text>
  <text x="87" y="146" font-size="9" fill="#1E293B" font-family="sans-serif">15</text>
  <text x="103" y="146" font-size="9" fill="#1E293B" font-family="sans-serif">16</text>
  <text x="119" y="146" font-size="9" fill="#1E293B" font-family="sans-serif">17</text>
  <text x="135" y="146" font-size="9" fill="#1E293B" font-family="sans-serif">18</text>
  <!-- Event marker dots -->
  <circle cx="62" cy="150" r="2" fill="#EF4444"/>
  <circle cx="126" cy="128" r="2" fill="#EF4444"/>
  <circle cx="78" cy="150" r="2" fill="#FCA5A5"/>
</svg>
