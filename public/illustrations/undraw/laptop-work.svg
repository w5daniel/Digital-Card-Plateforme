<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Desk surface -->
  <rect x="15" y="155" width="170" height="6" rx="3" fill="#CBD5E1"/>
  <!-- Laptop base -->
  <path d="M40 155 L50 145 L150 145 L160 155Z" fill="#334155"/>
  <!-- Laptop screen back -->
  <rect x="45" y="40" width="110" height="105" rx="6" fill="#1E293B"/>
  <!-- Screen bezel -->
  <rect x="52" y="47" width="96" height="85" rx="3" fill="#0F172A"/>
  <!-- Screen glow -->
  <rect x="55" y="50" width="90" height="79" rx="2" fill="#1E3A5F"/>
  <!-- Code lines on screen -->
  <rect x="62" y="58" width="40" height="3" rx="1" fill="#3B82F6"/>
  <rect x="62" y="66" width="55" height="3" rx="1" fill="#E2E8F0" opacity="0.5"/>
  <rect x="70" y="74" width="48" height="3" rx="1" fill="#E2E8F0" opacity="0.4"/>
  <rect x="70" y="82" width="35" height="3" rx="1" fill="#3B82F6" opacity="0.7"/>
  <rect x="62" y="90" width="60" height="3" rx="1" fill="#E2E8F0" opacity="0.5"/>
  <rect x="70" y="98" width="42" height="3" rx="1" fill="#E2E8F0" opacity="0.4"/>
  <rect x="70" y="106" width="30" height="3" rx="1" fill="#3B82F6" opacity="0.6"/>
  <rect x="62" y="114" width="50" height="3" rx="1" fill="#E2E8F0" opacity="0.3"/>
  <!-- Keyboard touchpad -->
  <rect x="88" y="148" width="24" height="4" rx="1" fill="#475569"/>
  <!-- Screen reflection -->
  <path d="M130 50 L145 50 L145 80" stroke="#3B82F6" stroke-width="0.5" opacity="0.2" fill="none"/>
  <!-- Coffee mug -->
  <rect x="168" y="138" width="14" height="17" rx="3" fill="#94A3B8"/>
  <path d="M182 142 C188 142 188 150 182 150" stroke="#94A3B8" stroke-width="2" fill="none"/>
  <ellipse cx="175" cy="138" rx="7" ry="2" fill="#64748B"/>
  <!-- Steam -->
  <path d="M172 132 C172 128 176 128 176 124" stroke="#CBD5E1" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M178 130 C178 126 174 126 174 122" stroke="#CBD5E1" stroke-width="1.5" stroke-linecap="round" fill="none"/>
</svg>